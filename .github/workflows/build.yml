name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-windows:
    name: Build Linux and Windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install fyne-cross
        run: go install github.com/fyne-io/fyne-cross@latest

      - name: Install Dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libgles2-mesa-dev libx11-dev libvulkan-dev \
            libxkbcommon-x11-dev libx11-xcb-dev libxcursor-dev libxfixes-dev libegl1-mesa-dev

      - name: Set Version
        id: vars
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            V=${GITHUB_REF#refs/tags/}
            echo "VERSION=$V" >> $GITHUB_ENV
            # Strip 'v' prefix for app-version if present
            CLEAN_V=${V#v}
            # Ensure it only contains digits and dots (some tags might have suffixes like -rc1)
            # We'll take only the numeric part
            if [[ $CLEAN_V =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
              echo "APP_VERSION=${BASH_REMATCH[0]}" >> $GITHUB_ENV
            else
              echo "APP_VERSION=0.0.1" >> $GITHUB_ENV
            fi
          else
            echo "VERSION=dev" >> $GITHUB_ENV
            echo "APP_VERSION=0.0.1" >> $GITHUB_ENV
          fi

      - name: Build with fyne-cross
        run: |
          # Build Linux (amd64, arm64)
          fyne-cross linux -arch amd64,arm64 -app-id github.com.chrplr.shuffle-go -app-version $APP_VERSION -name shuffle-gui -ldflags "-X=github.com/chrplr/shuffle-go/internal/version.Version=$VERSION" ./cmd/shuffle-gui
          # Build Windows (amd64, arm64)
          fyne-cross windows -arch amd64,arm64 -app-id github.com.chrplr.shuffle-go -app-version $APP_VERSION -name shuffle-gui -ldflags "-X=github.com/chrplr/shuffle-go/internal/version.Version=$VERSION" ./cmd/shuffle-gui

      - name: Package
        run: |
          mkdir -p release
          for platform in linux windows; do
            for arch in amd64 arm64; do
              ext=""
              if [ "$platform" = "windows" ]; then ext=".exe"; fi
              
              target_dir="dist/$platform-$arch"
              mkdir -p "$target_dir"
              
              # Build CLI (CGO disabled for maximum portability)
              GOOS=$platform GOARCH=$arch CGO_ENABLED=0 go build -ldflags="-s -w -X=github.com/chrplr/shuffle-go/internal/version.Version=${{ env.VERSION }}" -o "$target_dir/shuffle-cli$ext" ./cmd/shuffle-cli
              
              # Build Gio GUI (Linux only for now, as Windows CGO cross-build is complex)
              if [ "$platform" = "linux" ]; then
                GOOS=$platform GOARCH=$arch CGO_ENABLED=1 go build -ldflags="-s -w -X=github.com/chrplr/shuffle-go/internal/version.Version=${{ env.VERSION }}" -o "$target_dir/shuffle-gio$ext" ./cmd/shuffle-gio
              fi
              
              # Copy GUI from fyne-cross output
              cp "fyne-cross/bin/$platform-$arch/shuffle-gui$ext" "$target_dir/"
              
              # Copy README
              cp README.md "$target_dir/"
              
              # Zip it
              cd "$target_dir"
              zip -r "../../release/shuffle-${{ env.VERSION }}-$platform-$arch-binary.zip" .
              cd ../..
            done
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-windows-binaries
          path: release/*.zip

  build-macos:
    name: Build MacOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Set Version
        id: vars
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          else
            echo "VERSION=dev" >> $GITHUB_ENV
          fi

      - name: Build and Package MacOS
        run: |
          mkdir -p release
          for arch in amd64 arm64; do
            target_dir="dist/macos-$arch"
            mkdir -p "$target_dir"
            
            # Build CLI
            GOOS=darwin GOARCH=$arch CGO_ENABLED=0 go build -ldflags="-s -w -X=github.com/chrplr/shuffle-go/internal/version.Version=${{ env.VERSION }}" -o "$target_dir/shuffle-cli" ./cmd/shuffle-cli
            
            # Build GUI
            GOOS=darwin GOARCH=$arch CGO_ENABLED=1 go build -ldflags="-s -w -X=github.com/chrplr/shuffle-go/internal/version.Version=${{ env.VERSION }}" -o "$target_dir/shuffle-gui.app" ./cmd/shuffle-gui
            
            # Build Gio GUI
            GOOS=darwin GOARCH=$arch CGO_ENABLED=1 go build -ldflags="-s -w -X=github.com/chrplr/shuffle-go/internal/version.Version=${{ env.VERSION }}" -o "$target_dir/shuffle-gio.app" ./cmd/shuffle-gio
            
            # Copy README
            cp README.md "$target_dir/"
            
            # Zip it
            cd "$target_dir"
            zip -r "../../release/shuffle-${{ env.VERSION }}-macos-$arch-binary.zip" .
            cd ../..
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: release/*.zip

  release:
    name: Create Release
    needs: [build-linux-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          generate_release_notes: true
