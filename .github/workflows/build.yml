name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-windows:
    name: Build Linux and Windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install fyne-cross
        run: go install github.com/fyne-io/fyne-cross@latest

      - name: Install Linux Dependencies (for Gio)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev libx11-dev libx11-xcb-dev \
            libxkbcommon-x11-dev libgles2-mesa-dev \
            libegl1-mesa-dev libffi-dev libxcursor-dev \
            libvulkan-dev gcc-aarch64-linux-gnu nsis

      - name: Set Version
        id: vars
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            V=${GITHUB_REF#refs/tags/}
            echo "VERSION=$V" >> $GITHUB_ENV
            # Strip 'v' prefix for app-version if present
            CLEAN_V=${V#v}
            # Ensure it only contains digits and dots (some tags might have suffixes like -rc1)
            # We'll take only the numeric part
            if [[ $CLEAN_V =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
              echo "APP_VERSION=${BASH_REMATCH[0]}" >> $GITHUB_ENV
            else
              echo "APP_VERSION=0.0.1" >> $GITHUB_ENV
            fi
          else
            echo "VERSION=dev" >> $GITHUB_ENV
            echo "APP_VERSION=0.0.1" >> $GITHUB_ENV
          fi

      - name: Build with fyne-cross
        run: |
          # Ensure dependencies are downloaded
          go mod download
          # Build Fyne GUI
          fyne-cross linux -arch amd64,arm64 -app-id github.com.chrplr.shuffle-go -app-version $APP_VERSION -name shuffle-gui -ldflags "-X=github.com/chrplr/shuffle-go/internal/version.Version=$VERSION" ./cmd/shuffle-gui
          fyne-cross windows -arch amd64,arm64 -app-id github.com.chrplr.shuffle-go -app-version $APP_VERSION -name shuffle-gui -ldflags "-X=github.com/chrplr/shuffle-go/internal/version.Version=$VERSION" ./cmd/shuffle-gui

      - name: Package
        run: |
          mkdir -p release
          for platform in linux windows; do
            for arch in amd64 arm64; do
              ext=""
              if [ "$platform" = "windows" ]; then ext=".exe"; fi
              
              target_dir="dist/$platform-$arch"
              mkdir -p "$target_dir"
              
              # Build CLI (CGO disabled for maximum portability)
              GOOS=$platform GOARCH=$arch CGO_ENABLED=0 go build -ldflags="-s -w -X=github.com/chrplr/shuffle-go/internal/version.Version=$VERSION" -o "$target_dir/shuffle-cli$ext" ./cmd/shuffle-cli
              
              # Build Gio GUI
              # Linux AMD64 can be built on the host with CGO; Windows doesn't need CGO for Gio.
              # We skip Linux ARM64 for Gio as it requires a complex cross-compilation environment.
              if [ "$platform" = "windows" ]; then
                GOOS=$platform GOARCH=$arch CGO_ENABLED=0 go build -tags novulkan -ldflags="-s -w -X=github.com/chrplr/shuffle-go/internal/version.Version=$VERSION" -o "$target_dir/shuffle-gio$ext" ./cmd/shuffle-gio
              elif [ "$platform" = "linux" ] && [ "$arch" = "amd64" ]; then
                GOOS=$platform GOARCH=$arch CGO_ENABLED=1 go build -tags novulkan -ldflags="-s -w -X=github.com/chrplr/shuffle-go/internal/version.Version=$VERSION" -o "$target_dir/shuffle-gio$ext" ./cmd/shuffle-gio
              fi
              
              # Copy Fyne GUI from fyne-cross output
              cp "fyne-cross/bin/$platform-$arch/shuffle-gui$ext" "$target_dir/"
              
              # Copy README
              cp README.md "$target_dir/"
              
              # Zip it
              cd "$target_dir"
              zip -r "../../release/shuffle-$VERSION-$platform-$arch-binary.zip" .
              cd ../..
            done
          done

      - name: Create Linux AppImage and Windows Setup
        run: |
          # 1. Linux AppImage (AMD64)
          wget -q https://github.com/AppImage/AppImageKit/releases/download/13/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          
          mkdir -p AppDir/usr/bin
          cp dist/linux-amd64/shuffle-gui AppDir/usr/bin/
          cp dist/linux-amd64/shuffle-cli AppDir/usr/bin/
          
          cat <<EOF > AppDir/shuffle-go.desktop
          [Desktop Entry]
          Type=Application
          Name=Shuffle-Go
          Exec=shuffle-gui
          Icon=shuffle
          Categories=Utility;
          EOF
          
          # Use the provided jpg for the AppImage icon
          cp shuffle.jpg AppDir/shuffle.jpg
          # AppImage typically expects icons named after the Icon field in .desktop
          cp shuffle.jpg AppDir/shuffle.png
          
          cat <<EOF > AppDir/AppRun
          #!/bin/sh
          HERE="\$(dirname "\$(readlink -f "\${0}")")"
          exec "\${HERE}/usr/bin/shuffle-gui" "\$@"
          EOF
          chmod +x AppDir/AppRun
          
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run AppDir release/shuffle-$VERSION-linux-amd64.AppImage

          # 2. Windows Setup (AMD64)
          cat <<EOF > shuffle-go.nsi
          !include "MUI2.nsh"
          Name "Shuffle-Go"
          OutFile "release/shuffle-$VERSION-windows-amd64-setup.exe"
          InstallDir "\$PROGRAMFILES\Shuffle-Go"
          !insertmacro MUI_PAGE_WELCOME
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_PAGE_FINISH
          !insertmacro MUI_UNPAGE_WELCOME
          !insertmacro MUI_UNPAGE_CONFIRM
          !insertmacro MUI_UNPAGE_INSTFILES
          !insertmacro MUI_UNPAGE_FINISH
          !insertmacro MUI_LANGUAGE "English"
          Section "Install"
            SetOutPath "\$INSTDIR"
            File "/oname=shuffle-gui.exe" "dist/windows-amd64/shuffle-gui.exe"
            File "/oname=shuffle-cli.exe" "dist/windows-amd64/shuffle-cli.exe"
            File "shuffle.jpg"
            WriteUninstaller "\$INSTDIR\uninstall.exe"
            CreateShortcut "\$DESKTOP\Shuffle-Go.lnk" "\$INSTDIR\shuffle-gui.exe"
          SectionEnd
          Section "Uninstall"
            Delete "\$INSTDIR\shuffle-gui.exe"
            Delete "\$INSTDIR\shuffle-cli.exe"
            Delete "\$INSTDIR\shuffle.jpg"
            Delete "\$INSTDIR\uninstall.exe"
            Delete "\$DESKTOP\Shuffle-Go.lnk"
            RMDir "\$INSTDIR"
          SectionEnd
          EOF
          makensis shuffle-go.nsi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-windows-binaries
          path: |
            release/*.zip
            release/*.AppImage
            release/*-setup.exe

  build-macos:
    name: Build MacOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Set Version
        id: vars
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          else
            echo "VERSION=dev" >> $GITHUB_ENV
          fi

      - name: Build and Package MacOS
        run: |
          mkdir -p release
          # Install Fyne tool to help with packaging
          go install fyne.io/fyne/v2/cmd/fyne@latest
          
          # Ensure dependencies are downloaded and module is clean
          go mod download
          go mod tidy
          
          # Test build to ensure everything is resolved
          go build ./...
          
          for arch in amd64 arm64; do
            target_dir="dist/macos-$arch"
            mkdir -p "$target_dir"
            
            # Build CLI
            GOOS=darwin GOARCH=$arch CGO_ENABLED=0 go build -ldflags="-s -w -X=github.com/chrplr/shuffle-go/internal/version.Version=$VERSION" -o "$target_dir/shuffle-cli" ./cmd/shuffle-cli
            
            # Build GUI
            GOOS=darwin GOARCH=$arch CGO_ENABLED=1 go build -ldflags="-s -w -X=github.com/chrplr/shuffle-go/internal/version.Version=$VERSION" -o "$target_dir/shuffle-gui-raw" ./cmd/shuffle-gui
            
            # Package as .app using 'fyne package'
            # We point to the raw binary to avoid another build during packaging
            fyne package -os darwin -arch $arch -name Shuffle-Go -appID com.chrplr.shuffle -appVersion $VERSION -icon shuffle.jpg -executable "$target_dir/shuffle-gui-raw"
            
            # Move the resulting .app to target_dir and remove the raw binary
            mv Shuffle-Go.app "$target_dir/"
            rm "$target_dir/shuffle-gui-raw"
            
            # Build Gio GUI (MacOS needs CGO for Gio)
            GOOS=darwin GOARCH=$arch CGO_ENABLED=1 go build -tags novulkan -ldflags="-s -w -X=github.com/chrplr/shuffle-go/internal/version.Version=$VERSION" -o "$target_dir/shuffle-gio.app" ./cmd/shuffle-gio
            
            # Copy README
            cp README.md "$target_dir/"
            
            # Create DMG for the main GUI
            if [ "$arch" = "amd64" ] || [ "$arch" = "arm64" ]; then
              hdiutil create -volname "Shuffle-Go-$arch" -srcfolder "$target_dir/Shuffle-Go.app" -ov -format UDZO "release/shuffle-$VERSION-macos-$arch.dmg"
            fi

            # Zip everything as before
            cd "$target_dir"
            zip -r "../../release/shuffle-$VERSION-macos-$arch-binary.zip" .
            cd ../..
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: |
            release/*.zip
            release/*.dmg

  release:
    name: Create Release
    needs: [build-linux-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.zip
            release/*.dmg
            release/*.AppImage
            release/*-setup.exe
          generate_release_notes: true
